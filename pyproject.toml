[project]
name = "ccdf"
version = "0.1.0"
description = "Context-Compressed Decoding Flash: long-context acceleration via input-side context compression before DFlash."
readme = "README.md"
requires-python =  ">=3.10,<3.13"
authors = [
  { name = "onsra520" }
]
license = { text = "MIT" }

dependencies = [
  "torch",
  "transformers",
  "accelerate",
  "datasets",
  "sentencepiece",
  "protobuf",
  "numpy",
  "pandas",
  "tqdm",
  "scikit-learn",
  "llmlingua",
  "einops",
  "safetensors",
  "pyyaml",
]

[project.optional-dependencies]
dev = [
  "pytest",
  "ruff",
  "black",
  "mypy",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.black]
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]