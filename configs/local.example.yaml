models:
  qwen_drafter:
    model_id_or_path: "Qwen/Qwen3-0.6B"
    tensor_parallel_size: 1
    dtype: "auto"
    gpu_memory_utilization: 0.35

  gemma_e2b:
    model_id_or_path: "/models/gemma-e2b"
    tensor_parallel_size: 1
    dtype: "auto"
    gpu_memory_utilization: 0.55

  gemma_e4b_baseline:
    model_id_or_path: "/models/gemma-e4b"
    tensor_parallel_size: 1
    dtype: "auto"
    gpu_memory_utilization: 0.90

runtime:
  backend: "vllm"
  execution_mode: "concurrent"
  max_context_tokens: 4096
  seed: 1234

generation:
  max_new_tokens: 128
  stop_on_eos: true

dflash:
  parser: "strict_json"
  required_fields: ["draft_text"]
  default_max_tokens: 8
  hard_max_tokens: 16
  experimental_repair: false

low_tier:
  acceptance_policy: "greedy_exact_match"
  fallback_policy: "single_token_greedy"
  fallback_tokens_per_cycle: 1

decoding:
  default: "greedy"
  sampling:
    enabled: true
    experimental: true
    temperature: 0.7
    top_p: 0.9

benchmark:
  fixture_path: "benchmarks/fixtures/prompts.jsonl"
  dataset:
    enabled: false
    name: null
    split: null
