config_version: rec.dflash

project:
    name: ccdf
    root: "${PROJECT_ROOT}"
    source_identity:
        kind: local-source-tree

paths:
    project_root: "${PROJECT_ROOT}"
    models_root: "${PROJECT_ROOT}/models"
    baseline_model: "${PROJECT_ROOT}/models/baseline/Qwen3-4B-AWQ"
    dflash_target_model: "${PROJECT_ROOT}/models/dflash/target/Qwen3-4B-AWQ"
    dflash_target_fallback_model: "${PROJECT_ROOT}/models/dflash/target/Qwen3-4B-bnb-4bit"
    dflash_drafter_model: "${PROJECT_ROOT}/models/dflash/drafter/Qwen3-4B-DFlash-b16"
    compressor_model: "${PROJECT_ROOT}/models/compressor/llmlingua-2-xlm-roberta-large-meetingbank"
    data_root: "${PROJECT_ROOT}/data"
    artifacts_root: "${PROJECT_ROOT}/docs/artifacts"
    benchmark_inputs: "${PROJECT_ROOT}/data/benchmark"

models:
    baseline:
        model_id: Qwen/Qwen3-4B-AWQ
        local_path: "${PROJECT_ROOT}/models/baseline/Qwen3-4B-AWQ"
        revision: null
        quantization: awq-int4
        dtype: float16
        tokenizer_path: "${PROJECT_ROOT}/models/baseline/Qwen3-4B-AWQ"
        allow_cpu_offload: false
        device_map: cuda:0
        trust_remote_code: true

    dflash:
        target:
            model_id: Qwen/Qwen3-4B-AWQ
            local_path: "${PROJECT_ROOT}/models/dflash/target/Qwen3-4B-AWQ"
            fallback_model_id: unsloth/Qwen3-4B-bnb-4bit
            fallback_local_path: "${PROJECT_ROOT}/models/dflash/target/Qwen3-4B-bnb-4bit"
            revision: null
            quantization: awq-int4
            fallback_quantization: bitsandbytes-nf4-bfloat16
            dtype: float16
            tokenizer_path: "${PROJECT_ROOT}/models/dflash/target/Qwen3-4B-AWQ"
            allow_cpu_offload: false
            device_map: cuda:0
            trust_remote_code: true

        drafter:
            model_id: local-dflash-drafter
            local_path: "${PROJECT_ROOT}/models/dflash/drafter/Qwen3-4B-DFlash-b16"
            revision: b74e3a329c4d963783143b1e970d95b002be72bd
            dtype: bfloat16
            checkpoint_block_size: 16
            device_map: cuda:0
            trust_remote_code: true

    compressor:
        model_id: microsoft/llmlingua-2-xlm-roberta-large-meetingbank
        local_path: "${PROJECT_ROOT}/models/compressor/llmlingua-2-xlm-roberta-large-meetingbank"
        device: cuda:0
        reserved_budget_gib: 2.25
        load_in_rec2: false
        max_batch_size: 1

runtime:
    local_files_only: true
    device: cuda:0
    temperature: 0.0
    max_new_tokens: 256
    stop_token_ids: [151645]
    enable_thinking: false
    attention_backend: sdpa
    sdpa_kernel: math
    awq_split_k_iters: 1
    deterministic: true
    seed: 42
    allow_tf32: false
    matmul_precision: high
    cuda_allocator_conf: null

memory:
    dflash_peak_reserved_limit_gib: 6.0
    compressor_reserved_budget_gib: 2.25
    device_capacity_gib: 8.0
    compressor_residency_mode: staged
    generation_residency_mode: staged
    request_cache_policy: preserve
    enforce_after_model_load: true
    enforce_after_generation: true
    baseline_peak_reserved_limit_gib: null
    use_reserved_memory_for_gate: true

optimization:
    gpu_resident_acceptance: true
    output_contract_mode: finalize_only
    full_structural_audit: false
    compact_structural_audit: true
    profile_components: false

    block_policy:
        mode: fixed
        fixed_block_size: 16
        allowed_block_sizes: [4, 8, 12, 16]
        rolling_window: 4
        low_tau_threshold: 2.5
        high_tau_threshold: 4.5
        low_tau_block_size: 4
        mid_tau_block_size: 8
        high_tau_block_size: 16
        allow_subblock_shapes: true

    compile:
        drafter_enabled: false
        target_verify_enabled: false
        mode: reduce-overhead
        fullgraph: false
        dynamic: true

benchmark:
    warmup_requests: 1
    repetitions: 5
    smoke_max_new_tokens: 256
    prompt_format: chat
    measurement_mode: benchmark
    save_generated_text: true
    save_token_ids: true
    prompts:
        - "Compute 7 + 5. Briefly show the essential calculation, then end with exactly one line in the form `Final answer: <result>`."
        - "Explain why 9 multiplied by 0 equals 0. Briefly state the essential reasoning, then end with exactly one line in the form `Final answer: <result>` that states the general rule in words."
        - "A box has 18 red balls and 7 blue balls. Five red balls are removed. How many balls remain? Briefly show the essential calculation, then end with exactly one line in the form `Final answer: <result>`, repeating the unit `balls` in that line."
        - "A bookstore sells notebooks for $4 and pens for $2. Maya buys 6 notebooks and 5 pens, then uses a $7 coupon. What does she pay? Briefly show the essential calculation, then end with exactly one line in the form `Final answer: <result>` including currency."
        - "A train travels 120 km in 2 hours, stops for 30 minutes, then travels 180 km in 3 hours. Find total distance, elapsed time, and average speed. Carefully write the distance addition before dividing by elapsed time, and round the average speed to exactly two decimal places. The final line must label all three fields in this order: `Final answer: total distance <value> km; elapsed time <value> hours; average speed <value> km/h`."
        - "A rectangle is 12 m long and 9 m wide. Its length increases by 3 m and its width decreases by 2 m. Find the new area and the change from the original area. Briefly show the essential calculation. The final line must label both fields in this order: `Final answer: new area <value> square meters; decrease of <value> square meters`."
        - "A tank contains 240 liters of water. Thirty-five percent is used, then 60 liters are added. How many liters are in the tank? Briefly show the essential calculation, then end with exactly one line in the form `Final answer: <result>` and repeat the requested unit."
        - "A class has 28 boys and 32 girls. One quarter of the girls are absent and all boys attend. How many students attend, and what is the ratio of boys to attending girls in simplest whole-number colon notation? Briefly show the essential calculation. The final line must label both fields and include the attendance unit: `Final answer: attendance <value> students; ratio <boys:girls>`."
        - "A jacket costs $80. It is discounted by 15%, then an 8% sales tax is applied to the discounted price. What is the final price? Briefly show the essential calculation, then end with exactly one line in the form `Final answer: <result>` including currency."
        - "A cyclist rides 18 km at 12 km/h and then 30 km at 15 km/h. Find total distance, total time, and average speed. Briefly show the essential calculation. The final line must label all three fields in this order: `Final answer: total distance <value> km; total time <value> hours; average speed <value> km/h`."
    output_jsonl: "${PROJECT_ROOT}/docs/artifacts/benchmark/results.jsonl"
    summary_json: "${PROJECT_ROOT}/docs/artifacts/benchmark/summary.json"

validation:
    require_cuda: true
    require_single_gpu: true
    require_full_gpu_placement: true
    validate_model_contract: true
    smoke_prompts:
        - "What is 17 multiplied by 6? Briefly show the essential calculation, then end with exactly one line in the form `Final answer: <result>`."
        - "A shop sold 12 boxes with 8 items in each box. How many items were sold? Briefly show the essential calculation, then end with exactly one line in the form `Final answer: <result>`."
        - "A cyclist rides 18 km at 12 km/h and then 30 km at 15 km/h. Find total distance, total time, and average speed. Briefly show the essential calculation, then end with exactly one line in the form `Final answer: <result>` containing all three results."

prompts:
    system: "You are a careful mathematical assistant. Use plain text only: do not restate the problem and do not use headings or bullets. Show only the shortest essential calculation or explanation, verify it, and make the final non-empty line exactly `Final answer: <result>`."
    default_instruction: "Answer directly and stop when the answer is complete."
    gsm8k_instruction: "Solve with concise equations. Track all quantities, steps, and units; do not skip conversions or repeated actions. End with: Final answer: <number>"

datasets:
    seed: 42
    sample_size: 10
    qmsum_context_policy: query_aware_budgeted
    qmsum_context_budget_tokens: 1000
    qmsum_chunk_target_tokens: 300
    qmsum_query_policy: specific_only

dataset_smoke:
    version: qmsum-single-request.dataset-smoke.v2
    artifact_directory: "${PROJECT_ROOT}/docs/artifacts/qmsum-single-request-parity-smoke-n10/dataset-smoke"
    review_archive: "${PROJECT_ROOT}/docs/reviews/review-pack-qmsum-single-request-parity-smoke-n10.zip"
    config_overrides:
        prompts:
            system: "Answer the user request from the provided input. Follow the required output format exactly and stop when the answer is complete."
        runtime:
            attention_backend: sdpa
            sdpa_kernel: auto
        optimization:
            block_policy:
                mode: fixed
                fixed_block_size: 8
        memory:
            request_cache_policy: release_unused
    platform_overrides:
        win32:
            runtime:
                cuda_allocator_conf: null
        linux:
            runtime:
                cuda_allocator_conf: "expandable_segments:True,garbage_collection_threshold:0.5"
        default:
            runtime:
                cuda_allocator_conf: null
    cohorts:
        gsm8k: "${PROJECT_ROOT}/data/eval/gsm8k/gsm8k_n10.jsonl"
        qmsum: "${PROJECT_ROOT}/data/eval/qmsum/qmsum_n10.jsonl"
        manifest: "${PROJECT_ROOT}/data/manifests/dataset_manifest.json"
        selection_manifest: "${PROJECT_ROOT}/data/manifests/dataset_smoke_selection.json"
        expected_rows_per_dataset: 10
    compression:
        adaptive_keep_rate:
            enabled: true
            short_max_target_user_tokens: 127
            medium_max_target_user_tokens: 512
            short_keep_rate: 0.85
            medium_keep_rate: 0.70
            long_keep_rate: 0.55
            retry_keep_rate: 0.90
        min_context_tokens: 1
        chunk_size_tokens: 480
        chunk_overlap_tokens: 32
        tokenizer: compressor
        merge_policy: newline_preserve_order
    prompts:
        gsm8k_context_header: ""
        gsm8k_question_header: "Question:"
        qmsum_context_header: "Meeting transcript:"
        qmsum_question_header: "Question:"
    generation:
        gsm8k_max_new_tokens: 256
        qmsum_max_new_tokens: 512
        warmup_requests: 1
        repetitions: 1
        qmsum_request_protocol: single_final_generation
        qmsum_original_context_overflow_policy: fail
        condition_worker_max_attempts: 1
    watchdog:
        dataset_wall_clock_timeout_seconds: 3000
        condition_wall_clock_timeout_seconds: 900
        no_progress_timeout_seconds: 600
        poll_interval_seconds: 1
        terminate_grace_seconds: 10
    conditions:
        - {name: baseline-ar, runtime_condition: baseline, prompt_kind: original}
        - {name: dflash-r1, runtime_condition: dflash, prompt_kind: original}
        - {name: llmlingua-ar-r2, runtime_condition: baseline, prompt_kind: compressed}
        - {name: cc-dflash-r2, runtime_condition: dflash, prompt_kind: compressed}
    parity_pairs:
        - {name: original, left: baseline-ar, right: dflash-r1}
        - {name: compressed, left: llmlingua-ar-r2, right: cc-dflash-r2}
    evaluators:
        gsm8k:
            version: gsm8k-numeric.v1
            final_answer_prefix: "Final answer:"
            fixture_cases:
                - {generated: "work\nFinal answer: +1,200", reference: "1200", label: correct}
                - {generated: "Final answer: 1/2", reference: "0.5", label: correct}
                - {generated: "Final answer: 7", reference: "8", label: wrong_numeric}
                - {generated: "Final answer: seven", reference: "7", label: invalid_format}
                - {generated: "no final line", reference: "7", label: missing_answer}
        qmsum:
            version: qmsum-overlap.v1
            word_pattern: "[A-Za-z0-9]+"
            semantic_correctness: NOT_CLAIMED
            fixture_cases:
                - {generated: "Alpha beta beta", reference: "beta gamma", recall: 0.5, precision: 0.5}
                - {generated: "", reference: "beta", recall: 0.0, precision: 0.0}
    hard_gates:
        successful_condition_runs: 80
        logical_sample_generation_requests: 1
        final_outputs_per_sample: 1
        pair_input_token_parity_rate: 1.0
        pair_generated_token_parity_rate: 1.0
        protected_fields_rate: 1.0
        gsm8k_evaluator_valid_count: 10
        qmsum_evaluator_valid_count: 10
        qmsum_precompression_coverage_rate: 1.0
        hidden_truncated_tokens: 0
        dflash_peak_reserved_vram_gib: 6.0
        metric_validity_rate: 1.0
        max_oom_events: 0
        max_error_events: 0
        max_timeout_events: 0
        max_no_progress_timeouts: 0
        max_retry_events: 0
        max_resume_events: 0
        max_crash_events: 0
    validation_commands:
        compileall: [".venv/Scripts/python.exe", "-m", "compileall", "-q", "src"]
        pytest: [".venv/Scripts/python.exe", "-m", "pytest", "-q"]
        pip_check: [".venv/Scripts/python.exe", "-m", "pip", "check"]
        diff_check: ["git", "diff", "--check"]
        artifact_verify: [".venv/Scripts/python.exe", "-m", "ccdf.benchmark.dataset_smoke_verify", "--config", "config.yml"]

protocol_profiles:
    active: rec3
    profiles:
        rec3:
            description: "REC-3 four-condition mock10 validation profile"
            dataset: rec3_mock
            artifact_directory: "${PROJECT_ROOT}/docs/artifacts/qmsum-single-request-parity-smoke-n10/mock10"
            review_archive: "${PROJECT_ROOT}/docs/reviews/review-pack-rec3-protocol-four-conditions-mock10-final.zip"
            config_overrides:
                prompts:
                    system: "You are an information extraction assistant. Return only the requested output format."
                runtime:
                    max_new_tokens: 32
                    temperature: 0.0
                    attention_backend: sdpa
                    sdpa_kernel: auto
                optimization:
                    block_policy:
                        mode: fixed
                        fixed_block_size: 8
            compression:
                keep_rate: 0.5
                min_context_tokens: 1
                chunk_size_tokens: 480
                chunk_overlap_tokens: 32
                tokenizer: compressor
                merge_policy: newline_preserve_order
            prompt_contract:
                question: "According to the FINAL APPROVED FACT, who is the owner, what is the approval code, and what exact quantity was approved?"
                output_instruction: "Return exactly: Owner: <name>; Approval code: <code>; Quantity: <integer>"
                strict_output_pattern: '^Owner: (?P<owner>[^;\r\n]+); Approval code: (?P<approval_code>[^;\r\n]+); Quantity: (?P<quantity>[0-9]+)$'
                tolerant_field_pattern: 'Owner:\s*(?P<owner>[^;\r\n]+);\s*Approval code:\s*(?P<approval_code>[^;\r\n]+);\s*Quantity:\s*(?P<quantity>[0-9]+)'
                distractor_template: "Meeting turn {turn}: unapproved proposal says owner Candidate-{candidate}, code ZX-{fixture_index}{turn_padded}, quantity {distractor_quantity}; this is a distractor."
                evidence_template: "FINAL APPROVED FACT: the approved owner is {owner}; the approval code is {approval_code}; the exact approved quantity is {quantity}."
            conditions:
                - name: baseline-ar
                  runtime_condition: baseline
                  prompt_kind: original
                - name: dflash-r1
                  runtime_condition: dflash
                  prompt_kind: original
                - name: llmlingua-ar-r2
                  runtime_condition: baseline
                  prompt_kind: compressed
                  reduction_reference_condition: baseline-ar
                - name: cc-dflash-r2
                  runtime_condition: dflash
                  prompt_kind: compressed
                  reduction_reference_condition: dflash-r1
            parity_pairs:
                - name: original_baseline_ar_vs_dflash_r1
                  left: baseline-ar
                  right: dflash-r1
                - name: compressed_llmlingua_ar_r2_vs_cc_dflash_r2
                  left: llmlingua-ar-r2
                  right: cc-dflash-r2
            hard_gates:
                condition_success_rate: 1.0
                pair_generated_token_parity_rate: 1.0
                exact_field_quality_rate: 1.0
                protected_input_rate: 1.0
                metric_validity_rate: 1.0
                max_oom_events: 0
                dflash_peak_reserved_vram_gib: 6.0
            fixtures:
                - {turns: 16, evidence_position_fraction: 0.15, owner: Asha, approval_code: AP-701, quantity: '41'}
                - {turns: 16, evidence_position_fraction: 0.15, owner: Binh, approval_code: AP-702, quantity: '58'}
                - {turns: 20, evidence_position_fraction: 0.30, owner: Chen, approval_code: AP-703, quantity: '73'}
                - {turns: 24, evidence_position_fraction: 0.45, owner: Dara, approval_code: AP-704, quantity: '89'}
                - {turns: 28, evidence_position_fraction: 0.60, owner: Elena, approval_code: AP-705, quantity: '104'}
                - {turns: 32, evidence_position_fraction: 0.75, owner: Farid, approval_code: AP-706, quantity: '126'}
                - {turns: 30, evidence_position_fraction: 0.90, owner: Gia, approval_code: AP-707, quantity: '147'}
                - {turns: 30, evidence_position_fraction: 1.00, owner: Hana, approval_code: AP-708, quantity: '168'}
                - {turns: 18, evidence_position_fraction: 0.50, owner: Ivo, approval_code: AP-709, quantity: '193'}
                - {turns: 32, evidence_position_fraction: 0.70, owner: Juno, approval_code: AP-710, quantity: '215'}
