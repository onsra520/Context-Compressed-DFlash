<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ Arcana Infinitum ✦</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --gold: #D4AF37;
            --pale-gold: #F0D98C;
            --deep: #060213;
            --purple: #1C0A38;
            --indigo: #2A1760;
            --crimson: #6B0F3A;
            --lavender: #9B8EC4;
            --teal: #1A6B6A;
            --light-teal: #A0E8D0;
        }

        html,
        body {
            width: 100%;
            height: 100%
        }

        body {
            min-height: 100vh;
            background: #060213;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            font-family: 'Cinzel', serif;
        }

        .aurora {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 75% 65% at 18% 28%, rgba(42, 23, 96, .9) 0%, transparent 58%),
                radial-gradient(ellipse 60% 72% at 82% 72%, rgba(107, 15, 58, .55) 0%, transparent 60%),
                radial-gradient(ellipse 50% 45% at 50% 85%, rgba(26, 107, 106, .3) 0%, transparent 58%),
                radial-gradient(ellipse 100% 100% at 50% 50%, #1A0A38 0%, #060213 100%);
            animation: aurora-shift 22s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes aurora-shift {
            0% {
                filter: hue-rotate(0deg) brightness(1)
            }

            50% {
                filter: hue-rotate(18deg) brightness(1.08)
            }

            100% {
                filter: hue-rotate(-12deg) brightness(.94)
            }
        }

        #stars-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1
        }

        #bg-svg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .page-title {
            position: relative;
            z-index: 10;
            font-family: 'Cinzel Decorative', cursive;
            font-size: 10px;
            letter-spacing: 10px;
            color: rgba(212, 175, 55, .38);
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .cards-scene {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 74px;
            align-items: flex-start;
        }

        .card-link {
            display: block;
            text-decoration: none;
            color: inherit;
            width: 258px;
            height: 444px;
        }

        .card-link:focus-visible {
            outline: 2px solid rgba(212, 175, 55, 0.8);
            outline-offset: 10px;
            border-radius: 18px;
        }

        .tarot-card {
            position: relative;
            width: 258px;
            height: 444px;
            cursor: pointer;
        }

        #card1 {
            animation: float-a 7.5s ease-in-out infinite
        }

        #card2 {
            animation: float-b 7.5s ease-in-out infinite;
            animation-delay: -3.75s
        }

        #card1:hover,
        #card2:hover {
            animation-play-state: paused
        }

        .card-body {
            width: 100%;
            height: 100%;
            position: relative;
            transition: filter .4s ease;
            border-radius: 15px;
        }

        .tarot-card:hover .card-body {
            filter:
                drop-shadow(0 0 20px rgba(212, 175, 55, .7)) drop-shadow(0 0 55px rgba(155, 142, 196, .38)) drop-shadow(0 30px 40px rgba(0, 0, 0, .75));
        }

        #card2:hover .card-body {
            filter:
                drop-shadow(0 0 20px rgba(26, 107, 106, .8)) drop-shadow(0 0 55px rgba(160, 232, 208, .3)) drop-shadow(0 30px 40px rgba(0, 0, 0, .75));
        }

        .card-surface {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(155deg, #1E0A3C 0%, #130628 45%, #0A041A 100%);
        }

        #card2 .card-surface {
            background: linear-gradient(155deg, #0C1E2E 0%, #071218 45%, #030A10 100%);
        }

        .card-surface::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            padding: 1.5px;
            background: linear-gradient(135deg, #D4AF37, #8B6914, #D4AF37, #6B0F3A, #9B8EC4, #D4AF37);
            background-size: 400% 400%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            animation: border-grad 9s linear infinite;
        }

        #card2 .card-surface::before {
            background: linear-gradient(135deg, #1A6B6A, #D4AF37, #1A6B6A, #C84B31, #A0E8D0, #D4AF37);
            background-size: 400% 400%;
        }

        @keyframes border-grad {
            0% {
                background-position: 0% 50%
            }

            100% {
                background-position: 400% 50%
            }
        }

        .shimmer-layer {
            position: absolute;
            inset: 0;
            border-radius: 14px;
            background: linear-gradient(112deg, transparent 0%, transparent 28%, rgba(255, 255, 255, .05) 44%, rgba(255, 255, 255, .12) 50%, rgba(255, 255, 255, .05) 56%, transparent 72%, transparent 100%);
            transform: translateX(-180%) skewX(-22deg);
            pointer-events: none;
            z-index: 5;
        }

        .tarot-card:hover .shimmer-layer {
            animation: shimmer-go .9s ease forwards;
        }

        @keyframes shimmer-go {
            0% {
                transform: translateX(-180%) skewX(-22deg)
            }

            100% {
                transform: translateX(260%) skewX(-22deg)
            }
        }

        .card-inner-glow {
            position: absolute;
            inset: 0;
            border-radius: 14px;
            opacity: 0;
            transition: opacity .45s ease;
            pointer-events: none;
            z-index: 3;
        }

        #card1 .card-inner-glow {
            background: radial-gradient(ellipse 70% 50% at 50% 50%, rgba(155, 142, 196, .14) 0%, transparent 70%)
        }

        #card2 .card-inner-glow {
            background: radial-gradient(ellipse 70% 50% at 50% 50%, rgba(26, 107, 106, .18) 0%, transparent 70%)
        }

        .tarot-card:hover .card-inner-glow {
            opacity: 1
        }

        .card-svg {
            display: block;
            width: 100%;
            height: 100%
        }

        .particles-wrap {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: visible;
            z-index: 10;
        }

        /* Ambient bg particles */
        .bg-particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
        }

        @keyframes float-a {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-15px)
            }
        }

        @keyframes float-b {

            0%,
            100% {
                transform: translateY(-9px)
            }

            50% {
                transform: translateY(6px)
            }
        }

        @keyframes circle-cw {
            from {
                transform: rotate(0deg)
            }

            to {
                transform: rotate(360deg)
            }
        }

        @keyframes circle-ccw {
            from {
                transform: rotate(0deg)
            }

            to {
                transform: rotate(-360deg)
            }
        }

        @keyframes particle-up {
            0% {
                opacity: .88;
                transform: translateY(0) translateX(0) scale(1)
            }

            100% {
                opacity: 0;
                transform: translateY(-100px) translateX(var(--tx)) scale(.15)
            }
        }

        @keyframes bg-drift {
            0% {
                transform: translateY(0) translateX(0);
                opacity: var(--ao)
            }

            33% {
                transform: translateY(var(--dy)) translateX(var(--dx));
                opacity: calc(var(--ao)*.4)
            }

            66% {
                transform: translateY(calc(var(--dy)*1.5)) translateX(calc(var(--dx)*-.5));
                opacity: calc(var(--ao)*.7)
            }

            100% {
                transform: translateY(0) translateX(0);
                opacity: var(--ao)
            }
        }
    </style>
</head>

    <script>
        /* ===== STARS CANVAS ===== */
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const stars = Array.from({ length: 240 }, () => ({
            x: Math.random(),
            y: Math.random(),
            r: Math.random() * 1.5 + .25,
            phase: Math.random() * Math.PI * 2,
            speed: Math.random() * .014 + .004,
            type: Math.floor(Math.random() * 3)
        }));

        function drawStars(t) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const s of stars) {
                const a = (Math.sin(t * s.speed + s.phase) * .5 + .5) * .72 + .08;
                ctx.beginPath();
                ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
                if (s.type === 0) ctx.fillStyle = `rgba(212,175,55,${a * .8})`;
                else if (s.type === 1) ctx.fillStyle = `rgba(160,232,208,${a * .7})`;
                else ctx.fillStyle = `rgba(255,255,255,${a})`;
                ctx.fill();
            }
            requestAnimationFrame(drawStars);
        }
        requestAnimationFrame(drawStars);

        /* ===== PARTICLES ===== */
        function spawnParticle(wrap, isCard1) {
            const el = document.createElement('span');
            const x = 8 + Math.random() * 84;
            const bottom = 4 + Math.random() * 45;
            const size = Math.random() * 2.8 + .7;
            const tx = (Math.random() - .5) * 75;
            const dur = .85 + Math.random() * .95;
            const delay = Math.random() * .28;
            const palette1 = ['#D4AF37', '#9B8EC4', '#F0D98C', '#C84B31', '#E8D5FF'];
            const palette2 = ['#A0E8D0', '#D4AF37', '#1A6B6A', '#F5E88A', '#7FFFD4'];
            const pal = isCard1 ? palette1 : palette2;
            const color = pal[Math.floor(Math.random() * pal.length)];
            el.style.cssText = `
    position:absolute;left:${x}%;bottom:${bottom}%;
    width:${size}px;height:${size}px;border-radius:50%;
    background:${color};pointer-events:none;
    --tx:${tx}px;
    animation:particle-up ${dur}s ease-out ${delay}s forwards;
  `;
            wrap.appendChild(el);
            el.addEventListener('animationend', () => el.remove());
        }

        const timers = {};

        document.querySelectorAll('.tarot-card').forEach((card, idx) => {
            const wrap = card.querySelector('.particles-wrap');
            const body = card.querySelector('.card-body');
            const isCard1 = idx === 0;

            card.addEventListener('mouseenter', () => {
                body.style.transition = 'filter .4s ease, transform .1s ease';
                timers[idx] = setInterval(() => spawnParticle(wrap, isCard1), 115);
            });

            card.addEventListener('mousemove', e => {
                const r = card.getBoundingClientRect();
                const nx = (e.clientX - r.left) / r.width - .5;
                const ny = (e.clientY - r.top) / r.height - .5;
                body.style.transform = `perspective(1000px) translateY(-22px) rotateX(${-ny * 16}deg) rotateY(${nx * 16}deg) scale(1.04)`;
            });

            card.addEventListener('mouseleave', () => {
                clearInterval(timers[idx]);
                body.style.transition = 'filter .4s ease, transform .55s cubic-bezier(.23,1,.32,1)';
                body.style.transform = '';
            });
        });

        /* ===== AMBIENT BG PARTICLES ===== */
        const ambientColors = ['rgba(212,175,55,.55)', 'rgba(155,142,196,.45)', 'rgba(160,232,208,.4)', 'rgba(200,75,49,.35)'];
        for (let i = 0; i < 18; i++) {
            const bp = document.createElement('div');
            bp.className = 'bg-particle';
            const size = Math.random() * 2.5 + .8;
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const col = ambientColors[Math.floor(Math.random() * ambientColors.length)];
            const dur = 12 + Math.random() * 18;
            const dx = (Math.random() - .5) * 60;
            const dy = (Math.random() - .5) * 80;
            bp.style.cssText = `
    left:${x}%;top:${y}%;
    width:${size}px;height:${size}px;
    background:${col};
    --ao:${.35 + Math.random() * .4};
    --dx:${dx}px;--dy:${dy}px;
    animation:bg-drift ${dur}s ease-in-out ${-Math.random() * dur}s infinite;
  `;
            document.body.appendChild(bp);
        }

        /* inject particle keyframe needing CSS var */
        const ds = document.createElement('style');
        ds.textContent = `
@keyframes particle-up{
  0%{opacity:.88;transform:translateY(0) translateX(0) scale(1)}
  100%{opacity:0;transform:translateY(-100px) translateX(var(--tx)) scale(.15)}
}
`;
        document.head.appendChild(ds);
    </script>
